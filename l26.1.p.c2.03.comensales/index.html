<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comensales - HTML Plano</title>
</head>

<body>

  <section id="body">
    <h2>Gestion de Comensales (HTML Plano)</h2>
    <button id="body_btNuevoComensal">Nuevo comensal</button>
    <hr>
    <div>
      <strong>Total Comensales:</strong> <span id="body_lblTotalComensales">0</span><br>
      <strong>Total Recaudado:</strong> $<span id="body_lblTotalRecaudado">0.00</span><br>
      <strong>Promedio por persona:</strong> $<span id="body_lblPromedioPago">0.00</span><br>
      
    </div>
    <hr>
    <div>
      <strong>Porcentaje por Turno:</strong>
      <ul id="body_listaPorcentajesTurno"></ul>
    </div>
    <div>
      <strong>Porcentaje por Descuento:</strong>
      <ul id="body_listaPorcentajesDescuento"></ul>
    </div>
  </section>

  <section id="comensal" hidden>
    <h5>Registrar Comensal</h5>
    <div>
      <label>Nombre:
        <input type="text" id="comensal_inNombre" placeholder="Nombre del comensal">
      </label>
    </div>
    <div>
      <label>Apellido:
        <input type="text" id="comensal_inApellido" placeholder="Apellido del comensal">
      </label>
    </div>
    <div>
      <label>Cedula:
        <input type="text" id="comensal_inCedula" placeholder="Ej: 12345678">
      </label>
    </div>
    <div>
      <label>Sexo:
        <label><input type="radio" name="sexo" value="M" id="comensal_inSexoM" checked> Masculino</label>
        <label><input type="radio" name="sexo" value="F" id="comensal_inSexoF"> Femenino</label>
      </label>
    </div>
    <div>
      <label>Fecha Nacimiento:
        <input type="date" id="comensal_inFechaNac">
      </label>
    </div>
    <div>
      <label>Turno:
        <select id="comensal_inTurno">
          <option value="1">Desayuno ($5)</option>
          <option value="2">Almuerzo ($7)</option>
          <option value="3">Ambos ($10)</option>
        </select>
      </label>
    </div>
    <br>
    <button id="comensal_btCancelar">Cancelar</button>
    <button id="comensal_btAceptar">Aceptar</button>
  </section>

 
  <script type="module">
    import Cl_cGestionComensales from "./dist/controllers/Cl_cGestionComensales.js";
    import Cl_cComensal from "./dist/controllers/Cl_cComensal.js";
    import Cl_vGestionComensalesPlain from "./dist/views/Cl_vGestionComensalesPlain.js";
    import Cl_vComensalPlain from "./dist/views/Cl_vComensalPlain.js";

    const vistaGestion = new Cl_vGestionComensalesPlain();
    const vistaComensal = new Cl_vComensalPlain();
    const controladorComensal = new Cl_cComensal(vistaComensal);
    new Cl_cGestionComensales(vistaGestion, controladorComensal);
  </script>
</body>

</html>
