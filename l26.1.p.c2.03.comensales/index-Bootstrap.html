<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comensales - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div id="app-bootstrap" class="container mt-5">
    <h2>🍽️ Gestión de Comensales (Bootstrap)</h2>
    <button type="button" class="btn btn-primary" id="btnNuevoComensal">➕ Nuevo Comensal</button>
    <hr>
    <div class="row">
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Totales</h5>
            <p>Total Comensales: <strong id="totalComensales">0</strong></p>
            <p>Total Recaudado: <strong id="totalRecaudado">0.00</strong></p>
            <p>Total Costo Base: <strong id="totalCostoBase">0.00</strong></p>
            <p>Promedio por persona ($): <strong id="promedioPago">0.00</strong></p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">📊 % por Turno</h5>
            <ul class="list-group" id="porcentajesTurno"></ul>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">🎯 % por Descuento</h5>
            <ul class="list-group" id="porcentajesDescuento"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="comensalModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Registrar Comensal</h5>
        </div>
        <div class="modal-body">
          <label class="form-label">Nombre:</label>
          <input type="text" class="form-control" id="comensal_nombre">
          <label class="form-label">Apellido:</label>
          <input type="text" class="form-control" id="comensal_apellido">
          <label class="form-label">Cédula:</label>
          <input type="text" class="form-control" id="comensal_cedula">
          <label class="form-label">Sexo:</label>
          <div>
            <label><input type="radio" name="sexo" value="M" id="comensal_sexoM" checked> Masculino</label>
            <label><input type="radio" name="sexo" value="F" id="comensal_sexoF"> Femenino</label>
          </div>
          <label class="form-label mt-2">Fecha Nacimiento:</label>
          <input type="date" class="form-control" id="comensal_fechaNac">
          <label class="form-label mt-2">Turno:</label>
          <select class="form-select" id="comensal_turno">
            <option value="1">Desayuno ($5)</option>
            <option value="2">Almuerzo ($7)</option>
            <option value="3">Ambos ($10)</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="comensal_btCancelar">Cancelar</button>
          <button type="button" class="btn btn-success" id="comensal_btAceptar">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import Cl_cGestionComensales from "./dist/controllers/Cl_cGestionComensales.js";
    import Cl_cComensal from "./dist/controllers/Cl_cComensal.js";
    import Cl_vGestionComensalesBootstrap from "./dist/views/Cl_vGestionComensalesBootstrap.js";
    import Cl_vComensalBootstrap from "./dist/views/Cl_vComensalBootstrap.js";

    const vistaGestion = new Cl_vGestionComensalesBootstrap();
    const vistaComensal = new Cl_vComensalBootstrap();
    const controladorComensal = new Cl_cComensal(vistaComensal);
    new Cl_cGestionComensales(vistaGestion, controladorComensal);
  </script>
</body>
</html>
